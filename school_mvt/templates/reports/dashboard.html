{% extends "base.html" %}
{% block breadcrumb %}<li class="breadcrumb-item active">Reports</li>{% endblock %}
{% block content %}
<div class="row g-3">
  {% for cat in report_categories %}
  <div class="col-md-6 col-lg-3">
    <a href="{% url cat.url %}" class="text-decoration-none">
      <div class="stat-card">
        <div class="stat-icon" style="background:{{ cat.color }}20;color:{{ cat.color }};"><i class="bi {{ cat.icon }}"></i></div>
        <div class="stat-value" style="font-size:16px;margin-bottom:4px;">{{ cat.name }}</div>
        <div class="stat-label">Click to view →</div>
      </div>
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
