name: easyian_crm
description: Easyian CRM - Professional Desktop CRM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.65.0
  data_table_2: ^2.5.12
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  url_launcher: ^6.2.1
  cupertino_icons: ^1.0.6
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  uuid: ^4.3.3
  pdf: ^3.11.1
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

msix_config:
  display_name: Easyian CRM
  publisher_display_name: Easyian
  identity_name: com.easyian.crm
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png
  capabilities: internetClient
  app_installer:
    publish_folder_path: build/windows/app_installer
